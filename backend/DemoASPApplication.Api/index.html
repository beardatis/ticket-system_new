<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket kezelő</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 24px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input, textarea, select, button {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .ticket-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ticket-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      background: #fafafa;
    }

    .ticket-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .ticket-title {
      font-size: 18px;
      font-weight: bold;
      margin: 0;
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      background: #e5e7eb;
    }

    .meta {
      color: #666;
      font-size: 13px;
      margin-top: 10px;
    }

    .message {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
    }

    .success {
      background: #dcfce7;
      color: #166534;
    }

    .error {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty {
      color: #666;
      text-align: center;
      padding: 24px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Ticket kezelő rendszer</h1>
    <p class="subtitle">ASP.NET backendhez készült egyszerű frontend</p>

    <div class="grid">
      <div class="card">
        <h2>Új ticket létrehozása</h2>

        <div id="formMessage"></div>

        <form id="ticketForm">
          <div class="form-group">
            <label for="title">Cím</label>
            <input type="text" id="title" required />
          </div>

          <div class="form-group">
            <label for="description">Leírás</label>
            <textarea id="description"></textarea>
          </div>

          <div class="form-group">
            <label for="priority">Prioritás</label>
            <select id="priority" required>
              <option value="0">Low</option>
              <option value="1">Medium</option>
              <option value="2">High</option>
            </select>
          </div>

          <div class="form-group">
            <label for="category">Kategória</label>
            <select id="category" required>
              <option value="">Betöltés...</option>
            </select>
          </div>

          <button type="submit">Ticket létrehozása</button>
        </form>
      </div>

      <div class="card">
        <h2>Ticket lista</h2>
        <div id="ticketList" class="ticket-list">
          <div class="empty">Betöltés...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://localhost:7210/api";
    // Ha nálad más a port, akkor ezt írd át.
    // Pl.: http://localhost:5222/api

    const ticketList = document.getElementById("ticketList");
    const categorySelect = document.getElementById("category");
    const ticketForm = document.getElementById("ticketForm");
    const formMessage = document.getElementById("formMessage");

    async function fetchCategories() {
      try {
        const response = await fetch(`${API_BASE}/Categories`);

        if (!response.ok) {
          throw new Error("Nem sikerült betölteni a kategóriákat.");
        }

        const categories = await response.json();

        categorySelect.innerHTML = '<option value="">Válassz kategóriát</option>';

        categories.forEach(category => {
          const option = document.createElement("option");
          option.value = category.id;
          option.textContent = category.name;
          categorySelect.appendChild(option);
        });
      } catch (error) {
        categorySelect.innerHTML = '<option value="">Hiba történt</option>';
        showFormMessage(error.message, "error");
      }
    }

    async function fetchTickets() {
      try {
        const response = await fetch(`${API_BASE}/Tickets`);

        if (!response.ok) {
          throw new Error("Nem sikerült betölteni a ticketeket.");
        }

        const tickets = await response.json();
        renderTickets(tickets);
      } catch (error) {
        ticketList.innerHTML = `<div class="message error">${error.message}</div>`;
      }
    }

    function renderTickets(tickets) {
      if (!tickets.length) {
        ticketList.innerHTML = '<div class="empty">Még nincs egyetlen ticket sem.</div>';
        return;
      }

      ticketList.innerHTML = "";

      tickets.forEach(ticket => {
        const item = document.createElement("div");
        item.className = "ticket-item";

        item.innerHTML = `
          <div class="ticket-header">
            <h3 class="ticket-title">${escapeHtml(ticket.title)}</h3>
          </div>

          <p>${escapeHtml(ticket.description || "Nincs leírás")}</p>

          <div class="badge-row">
            <span class="badge">Státusz: ${formatStatus(ticket.status)}</span>
            <span class="badge">Prioritás: ${formatPriority(ticket.priority)}</span>
            <span class="badge">Kategória: ${escapeHtml(ticket.categoryName)}</span>
          </div>

          <div class="meta">
            Létrehozva: ${formatDate(ticket.createdAt)} | Azonosító: ${ticket.id}
          </div>
        `;

        ticketList.appendChild(item);
      });
    }

    ticketForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const newTicket = {
        title: document.getElementById("title").value.trim(),
        description: document.getElementById("description").value.trim(),
        priority: Number(document.getElementById("priority").value),
        categoryId: Number(document.getElementById("category").value)
      };

      try {
        const response = await fetch(`${API_BASE}/Tickets`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(newTicket)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Hiba történt a létrehozás során.");
        }

        showFormMessage("A ticket sikeresen létrejött.", "success");
        ticketForm.reset();
        await fetchTickets();
      } catch (error) {
        showFormMessage(error.message, "error");
      }
    });

    function showFormMessage(message, type) {
      formMessage.innerHTML = `<div class="message ${type}">${message}</div>`;
    }

    function formatStatus(status) {
      switch (status) {
        case 0: return "Open";
        case 1: return "In Progress";
        case 2: return "Closed";
        default: return status;
      }
    }

    function formatPriority(priority) {
      switch (priority) {
        case 0: return "Low";
        case 1: return "Medium";
        case 2: return "High";
        default: return priority;
      }
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString("hu-HU");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text;
      return div.innerHTML;
    }

    async function init() {
      await fetchCategories();
      await fetchTickets();
    }

    init();
  </script>
</body>
</html>
